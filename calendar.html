<!DOCTYPE html>
<html>


<head>

<title>Calendar | High School Planner</title>

<link rel="stylesheet" href="../style.css">

</head>



<body>


<div class="app">



<button class="menu-btn" onclick="toggleSidebar()">
☰
</button>







<aside class="sidebar" id="sidebar">


<h1>
🎓 Planner
</h1>




<div class="student-box">


<div class="avatar">
👨‍🎓
</div>


<h3>
Student
</h3>


<p>
High School Planner
</p>


</div>







<ul>


<li>

<a href="dashboard.html">

🏠 Dashboard

</a>

</li>




<li>

<a href="homework.html">

📚 Homework

</a>

</li>




<li>

<a href="schedule.html">

📅 Schedule

</a>

</li>




<li>

<a href="calendar.html">

🗓 Calendar

</a>

</li>




<li>

<a href="settings.html">

⚙ Settings

</a>

</li>



</ul>


</aside>









<main class="content">






<div class="hero-card">


<h1>
🗓 My Calendar
</h1>


<p>
Plan exams, homework, events, and reminders.
</p>


</div>









<div class="section-card">


<h2>
➕ Add Event
</h2>





<input
id="eventTitle"
placeholder="Event name">





<input
id="eventDate"
type="date">





<input
id="eventTime"
placeholder="Event time">





<textarea
id="eventDescription"
placeholder="Event description">
</textarea>





<br>


<button onclick="addEvent()">

Add Event +

</button>




</div>









<div class="calendar-box">



<div class="calendar-header">


<button onclick="previousMonth()">

⬅

</button>



<h2 id="monthYear">

</h2>



<button onclick="nextMonth()">

➡

</button>



</div>







<div class="calendar-week">


<div>
Sun
</div>


<div>
Mon
</div>


<div>
Tue
</div>


<div>
Wed
</div>


<div>
Thu
</div>


<div>
Fri
</div>


<div>
Sat
</div>



</div>







<div id="calendarDays" class="calendar-days">


</div>





</div>









<div class="section-card">


<h2>
📌 My Events
</h2>



<div id="eventList">


</div>



</div>







</main>


</div>







<script src="../js/calendar.js"></script>


<script src="../js/sidebar.js"></script>




</body>


</html>
