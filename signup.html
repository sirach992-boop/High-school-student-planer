<!DOCTYPE html>
<html>

<head>

<title>Create Account</title>

<link rel="stylesheet" href="../style.css">

</head>


<body>


<div class="content">


<div class="section-card">


<h1>
🎓 Create Account
</h1>



<input
id="signupName"
placeholder="Full Name">



<input
id="signupEmail"
placeholder="Email">



<input
id="signupPassword"
type="password"
placeholder="Password">



<br><br>


<button onclick="signup()">

Create Account

</button>



<p>

Already have an account?

<a href="login.html">
Login
</a>


</p>



</div>


</div>




<script src="../js/account.js"></script>


</body>

</html>
